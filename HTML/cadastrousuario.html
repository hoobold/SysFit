<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Usuários</title>
    <link rel="stylesheet" href="../HTML/CSS/cadastro.css">
</head>
<body>

    <div class="pagina-cadastro">

        <div class="logo">
            <img src="IMG/logo_sysfit.png" alt="Logo SysFit">
        </div>

        <div class="container-form">
            <h2>Cadastro de Usuário</h2>
        </div>

       

    <form method="POST">

    <label for="nome">Nome</label>
    <input
        type="text"
        id="nome"
        name="nome"
        required>

    
    <label for="email">E-mail</label>
    <input
        type="email"
        id="email"
        name="email"
        required>

    <label for="data_nascimento">
        Data de Nascimento
    </label>

    <input
        type="date"
        id="data_nascimento"
        name="data_nascimento"
        required>

    <label for="senha">Senha</label>
    <input
        type="password"
        id="senha"
        name="senha"
        required>

        <button type="submit">
            Cadastrar
        </button>

        <a href="index.html" class="botao-voltar">
            Voltar
        </a>

    </form>
</body>
</html>
